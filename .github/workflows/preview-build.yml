name: Build Android Release

on:
  push:
    tags:
      - "android-v*"

concurrency:
  group: android-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: "17"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate release source
        run: pnpm --filter @painel-prime/mobile run validate

      - name: Setup EAS CLI
        run: npm install --global eas-cli@20.5.1

      - name: Build official APK
        working-directory: apps/mobile
        run: eas build --platform android --profile release-apk --local --non-interactive --output=../../painel-prime-android-1.5.0-build10.apk
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          EXPO_PUBLIC_SENTRY_DSN: ${{ secrets.EXPO_PUBLIC_SENTRY_DSN }}
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
          EXPO_PUBLIC_BASE_SIGNATURE_URL: ${{ secrets.EXPO_PUBLIC_BASE_SIGNATURE_URL }}
          EXPO_PUBLIC_BASE_INVITE_URL: ${{ secrets.EXPO_PUBLIC_BASE_INVITE_URL }}
          EXPO_PUBLIC_BASE_NOIVOS_URL: ${{ secrets.EXPO_PUBLIC_BASE_NOIVOS_URL }}

      - name: Verify APK signature
        shell: bash
        run: |
          set -euo pipefail
          APK="painel-prime-android-1.5.0-build10.apk"
          APKSIGNER="$(find "$ANDROID_HOME/build-tools" -name apksigner -type f | sort -V | tail -1)"
          test -f "$APK"
          "$APKSIGNER" verify --print-certs "$APK" | tee apk-signature.txt
          grep -qi "bf524e07f7cb2457aa8cd183aa38b8454f2addd6a6e229ecf858778965bec82b" apk-signature.txt
          sha256sum "$APK" | tee painel-prime-android-1.5.0-build10.sha256

      - name: Upload official APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: painel-prime-android-1.5.0-build10
          path: |
            painel-prime-android-1.5.0-build10.apk
            painel-prime-android-1.5.0-build10.sha256
          if-no-files-found: error

      - name: Publish to Firebase App Distribution
        run: |
          npx --yes firebase-tools@15.23.0 appdistribution:distribute painel-prime-android-1.5.0-build10.apk \
            --app "${{ secrets.FIREBASE_APP_ID }}" \
            --groups "testers" \
            --release-notes-file docs/ANDROID_1_5_0_RELEASE_NOTES.txt
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
